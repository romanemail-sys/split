databases:
  - name: split-db
    plan: free
    databaseName: split
    user: split

services:
  - type: web
    name: split-api
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build --workspace=shared && cd server && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node server/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: split-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false   # set manually after client is deployed

  - type: web
    name: split-client
    env: static
    buildCommand: npm install --include=dev && npm run build --workspace=shared && npm run build --workspace=client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set manually after API is deployed
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
